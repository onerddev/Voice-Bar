<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>VoiceBar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--accent:#c8ff00;--accent2:#00e5ff;--muted:#2e2e2e;--text:#eee;--sub:#555;--panel:#111;--border:#222;--danger:#ff4f4f;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#0d0d0d;font-family:'Syne',sans-serif;overflow:hidden;user-select:none;}

/* TITLEBAR */
.titlebar{height:36px;background:#0a0a0a;display:flex;align-items:center;justify-content:space-between;padding:0 12px;-webkit-app-region:drag;border-bottom:1px solid var(--border);flex-shrink:0;}
.title-left{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:7px;}
.title-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s,box-shadow .3s;}
.title-dot.listening{background:var(--accent);box-shadow:0 0 8px var(--accent);}
.title-dot.speaking{background:var(--accent2);box-shadow:0 0 8px var(--accent2);}
.title-dot.thinking{background:#f90;box-shadow:0 0 8px #f90;animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.title-btns{display:flex;gap:4px;-webkit-app-region:no-drag;}
.tb{width:24px;height:24px;border-radius:50%;background:none;border:none;cursor:pointer;color:var(--sub);font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;}
.tb:hover{background:rgba(255,255,255,.08);color:var(--text);}
.tb.danger:hover{background:var(--danger);color:#fff;}

/* APP LAYOUT */
.app{display:flex;flex-direction:column;height:calc(100vh - 36px);}

/* CHAT AREA */
.chat{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--muted) transparent;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}
.msg{max-width:88%;padding:9px 13px;border-radius:14px;font-size:12.5px;line-height:1.55;font-family:'DM Mono',monospace;font-weight:300;animation:fadeUp .25s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{background:#1c2a00;border:1px solid #2d4400;color:#d4f080;align-self:flex-end;border-bottom-right-radius:4px;}
.msg.ai{background:var(--panel);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.msg.system{background:transparent;border:none;color:var(--sub);font-size:10px;text-align:center;align-self:center;letter-spacing:.06em;}

/* INPUT ROW */
.input-row{display:flex;align-items:center;gap:8px;padding:8px 12px 10px;border-top:1px solid var(--border);flex-shrink:0;background:#0a0a0a;}
.chat-input{flex:1;background:#141414;border:1px solid var(--border);border-radius:22px;padding:9px 14px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;outline:none;transition:border-color .2s;resize:none;height:38px;line-height:1.4;overflow:hidden;}
.chat-input:focus{border-color:var(--accent);}
.chat-input::placeholder{color:var(--sub);}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s,transform .15s;}
.send-btn:hover{opacity:.85;transform:scale(1.05);}
.send-btn svg{width:16px;height:16px;color:#000;}

/* MIC BUTTON */
.mic-wrap{position:relative;flex-shrink:0;}
.mic-btn{width:38px;height:38px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;transition:background .2s,box-shadow .2s,transform .15s;}
.mic-btn svg{width:17px;height:17px;color:#111;transition:color .2s;}
.mic-btn:hover{transform:scale(1.05);}
.mic-btn.listening{background:var(--accent);box-shadow:0 0 16px rgba(200,255,0,.5);}
.mic-btn.listening svg{color:#000;}
.mic-btn.thinking{background:#f90;}
.mic-btn.thinking svg{color:#000;}
.ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--accent);opacity:0;z-index:1;}
.ring2{inset:-4px;}
.listening-rings .ring{animation:rp 1.2s ease-out infinite;}
.listening-rings .ring2{animation:rp 1.2s ease-out infinite .45s;}
@keyframes rp{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.2);opacity:0}}

/* BARS VIZ — shown only while listening/speaking in titlebar area */
.viz-row{display:flex;align-items:center;gap:3px;height:16px;margin-left:8px;}
.vbar{width:2px;background:var(--muted);border-radius:2px;height:3px;transition:background .2s;}
.listening .vbar{background:var(--accent);}
.listening .vbar:nth-child(1){animation:bL .5s ease-in-out infinite 0.00s}
.listening .vbar:nth-child(2){animation:bL .5s ease-in-out infinite 0.07s}
.listening .vbar:nth-child(3){animation:bL .5s ease-in-out infinite 0.14s}
.listening .vbar:nth-child(4){animation:bL .5s ease-in-out infinite 0.03s}
.listening .vbar:nth-child(5){animation:bL .5s ease-in-out infinite 0.10s}
@keyframes bL{0%,100%{height:3px}50%{height:14px}}
.speaking .vbar{background:var(--accent2);}
.speaking .vbar:nth-child(1){animation:bS .35s ease-in-out infinite 0.00s}
.speaking .vbar:nth-child(2){animation:bS .35s ease-in-out infinite 0.04s}
.speaking .vbar:nth-child(3){animation:bS .35s ease-in-out infinite 0.08s}
.speaking .vbar:nth-child(4){animation:bS .35s ease-in-out infinite 0.02s}
.speaking .vbar:nth-child(5){animation:bS .35s ease-in-out infinite 0.06s}
@keyframes bS{0%,100%{height:2px}50%{height:12px}}

/* SETTINGS */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:200;}
.settings-overlay.open{display:flex;}
.settings-box{background:#141414;border:1px solid var(--border);border-radius:18px;padding:22px 20px 18px;width:330px;box-shadow:0 20px 60px rgba(0,0,0,.9);max-height:88vh;overflow-y:auto;}
.settings-box h3{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sub);margin-bottom:18px;}
.s-close{float:right;margin-top:-4px;background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;line-height:1;}
.s-close:hover{color:var(--text);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;font-family:'DM Mono',monospace;}
.field input{width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);}
.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.model-card{background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:border-color .2s;position:relative;}
.model-card.selected{border-color:var(--accent);}
.model-card .dot{position:absolute;top:7px;right:7px;width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0;}
.model-card.selected .dot{opacity:1;}
.m-name{font-size:10px;color:var(--text);font-family:'DM Mono',monospace;}
.m-tag{font-size:9px;color:var(--sub);font-family:'DM Mono',monospace;margin-top:2px;text-transform:uppercase;}
.model-card.selected .m-name{color:var(--accent);}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0;}
.row-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.test-btn{background:none;border:1px solid var(--border);color:var(--sub);border-radius:5px;padding:2px 8px;font-size:9px;cursor:pointer;font-family:'DM Mono',monospace;}
.test-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.save-btn{width:100%;margin-top:14px;background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
.save-btn:hover{opacity:.85;}

.toast{position:fixed;top:44px;left:50%;transform:translateX(-50%) translateY(-4px);background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:11px;color:var(--text);font-family:'DM Mono',monospace;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- TITLEBAR -->
<div class="titlebar" id="titlebar">
  <div class="title-left">
    <span class="title-dot" id="titleDot"></span>
    <span id="titleStatus">VoiceBar</span>
    <div class="viz-row" id="vizRow">
      <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
      <div class="vbar"></div><div class="vbar"></div>
    </div>
  </div>
  <div class="title-btns">
    <button class="tb" id="settingsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="tb" id="hideBtn">─</button>
    <button class="tb danger" id="quitBtn">✕</button>
  </div>
</div>

<!-- CHAT -->
<div class="app">
  <div class="chat" id="chat">
    <div class="msg system">Olá! Fale ou escreva. Posso abrir apps, sites, pesquisar e responder perguntas.</div>
  </div>

  <div class="input-row">
    <!-- MIC -->
    <div class="mic-wrap" id="micWrap">
      <button class="mic-btn" id="micBtn" title="Clique para falar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div class="ring"></div>
      <div class="ring ring2"></div>
    </div>

    <!-- TEXT INPUT -->
    <textarea class="chat-input" id="chatInput" placeholder="Escreva aqui ou clique no mic…" rows="1"></textarea>

    <!-- SEND -->
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-box">
    <button class="s-close" id="sClose">×</button>
    <h3>⚙ Configurações</h3>
    <div class="field">
      <label>Chave API Groq</label>
      <input type="password" id="apiKeyInput" placeholder="gsk_..." autocomplete="off"/>
    </div>
    <div class="field">
      <label>Modelo de IA</label>
      <div class="model-grid" id="modelGrid"></div>
    </div>
    <hr class="sep">
    <div class="field">
      <div class="row-label">
        <label style="margin:0">ElevenLabs — Chave API</label>
      </div>
      <input type="password" id="elevenKeyInput" placeholder="xi-api-key..." autocomplete="off"/>
    </div>
    <div class="field">
      <div class="row-label">
        <label style="margin:0">ElevenLabs — Voice ID</label>
        <button class="test-btn" id="testVoiceBtn">▶ testar voz</button>
      </div>
      <input type="text" id="elevenVoiceInput" placeholder="voice id..." autocomplete="off"/>
    </div>
    <div class="field">
      <label>Velocidade da fala — <span id="voiceRateVal">1.0x</span></label>
      <input type="range" id="voiceRate" min="0.5" max="2.0" step="0.05" value="1.0" style="width:100%;padding:0;height:3px;accent-color:var(--accent);"/>
    </div>
    <button class="save-btn" id="saveBtn">Salvar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { ipcRenderer } = require('electron');

/* ══ ALL CONFIG VARS — declared first ══ */
const MODELS = [
  {id:'llama-3.3-70b-versatile', name:'Llama 3.3 70B', tag:'Poderoso'},
  {id:'llama3-8b-8192',          name:'Llama 3 8B',    tag:'Rápido'},
  {id:'mixtral-8x7b-32768',      name:'Mixtral 8x7B',  tag:'Longo'},
  {id:'gemma2-9b-it',            name:'Gemma 2 9B',    tag:'Google'},
];
let apiKey      = localStorage.getItem('groq_key')     || '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';
let model       = localStorage.getItem('groq_model')   || MODELS[0].id;
let elevenKey   = localStorage.getItem('eleven_key')   || '13136e4ef6be4462b40570d797577178dc03a7dacc4c0247b9048c8e3f8d4f97';
let elevenVoice = localStorage.getItem('eleven_voice') || 'z6ZcivXMtmIrKdghvixL';
let voiceRate   = parseFloat(localStorage.getItem('voice_rate') || '1.0');

/* ══ ELEMENTS ══ */
const chatEl          = document.getElementById('chat');
const chatInput       = document.getElementById('chatInput');
const sendBtn         = document.getElementById('sendBtn');
const micBtn          = document.getElementById('micBtn');
const micWrap         = document.getElementById('micWrap');
const titleDot        = document.getElementById('titleDot');
const titleStatus     = document.getElementById('titleStatus');
const vizRow          = document.getElementById('vizRow');
const settingsBtn     = document.getElementById('settingsBtn');
const settingsOverlay = document.getElementById('settingsOverlay');
const sClose          = document.getElementById('sClose');
const apiKeyInput     = document.getElementById('apiKeyInput');
const modelGrid       = document.getElementById('modelGrid');
const elevenKeyInput  = document.getElementById('elevenKeyInput');
const elevenVoiceInput= document.getElementById('elevenVoiceInput');
const voiceRateSlider = document.getElementById('voiceRate');
const voiceRateVal    = document.getElementById('voiceRateVal');
const testVoiceBtn    = document.getElementById('testVoiceBtn');
const saveBtn         = document.getElementById('saveBtn');
const hideBtn         = document.getElementById('hideBtn');
const quitBtn         = document.getElementById('quitBtn');
const toastEl         = document.getElementById('toast');

/* ══ INIT SETTINGS UI ══ */
function buildGrid() {
  modelGrid.innerHTML = '';
  MODELS.forEach(m => {
    const c = document.createElement('div');
    c.className = 'model-card' + (m.id===model?' selected':'');
    c.innerHTML = `<div class="dot"></div><div class="m-name">${m.name}</div><div class="m-tag">${m.tag}</div>`;
    c.onclick = () => { document.querySelectorAll('.model-card').forEach(x=>x.classList.remove('selected')); c.classList.add('selected'); model=m.id; };
    modelGrid.appendChild(c);
  });
}
buildGrid();
apiKeyInput.value      = apiKey;
elevenKeyInput.value   = elevenKey;
elevenVoiceInput.value = elevenVoice;
voiceRateSlider.value  = voiceRate;
voiceRateVal.textContent = voiceRate.toFixed(1)+'x';
voiceRateSlider.oninput = () => { voiceRate=parseFloat(voiceRateSlider.value); voiceRateVal.textContent=voiceRate.toFixed(1)+'x'; };

settingsBtn.onclick = () => settingsOverlay.classList.add('open');
sClose.onclick      = () => settingsOverlay.classList.remove('open');
settingsOverlay.onclick = e => { if(e.target===settingsOverlay) settingsOverlay.classList.remove('open'); };
saveBtn.onclick = () => {
  apiKey=apiKeyInput.value.trim(); elevenKey=elevenKeyInput.value.trim(); elevenVoice=elevenVoiceInput.value.trim();
  localStorage.setItem('groq_key',apiKey); localStorage.setItem('groq_model',model);
  localStorage.setItem('eleven_key',elevenKey); localStorage.setItem('eleven_voice',elevenVoice);
  localStorage.setItem('voice_rate',voiceRate.toString());
  settingsOverlay.classList.remove('open'); showToast('✓ Salvo!');
};
testVoiceBtn.onclick = () => speak('Olá! Essa é minha voz. Como posso ajudar você?');
hideBtn.onclick = () => ipcRenderer.send('hide-window');
quitBtn.onclick = () => ipcRenderer.send('quit-app');

/* ══ TOAST ══ */
let toastT;
function showToast(m){clearTimeout(toastT);toastEl.textContent=m;toastEl.classList.add('show');toastT=setTimeout(()=>toastEl.classList.remove('show'),2500);}

/* ══ CHAT MESSAGES ══ */
function addMsg(text, role) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
  return d;
}

/* ══ STATE ══ */
let isSpeaking  = false;
let isRecording = false;
let currentAudio = null;
const synth = window.speechSynthesis;

function setState(s) {
  // titlebar dot
  titleDot.className = 'title-dot' + (s?' '+s:'');
  // mic button
  micBtn.className   = 'mic-btn'   + (s==='listening'?' listening':s==='thinking'?' thinking':'');
  micWrap.className  = 'mic-wrap'  + (s==='listening'?' listening-rings':'');
  // viz bars class on vizRow parent so CSS selectors work
  vizRow.parentElement.className = 'title-left' + (s?' '+s:'');

  if      (s==='listening') titleStatus.textContent = 'Ouvindo…';
  else if (s==='thinking')  titleStatus.textContent = 'Pensando…';
  else if (s==='speaking')  titleStatus.textContent = 'Falando…';
  else                      titleStatus.textContent = 'VoiceBar';
}

/* ══ TTS — ELEVENLABS ══ */
async function speak(text) {
  stopSpeaking();
  isSpeaking = true;
  setState('speaking');
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${elevenVoice}/stream`, {
      method:'POST',
      headers:{'xi-api-key':elevenKey,'Content-Type':'application/json'},
      body:JSON.stringify({
        text, model_id:'eleven_multilingual_v2',
        voice_settings:{stability:0.45,similarity_boost:0.85,style:0.25,use_speaker_boost:true},
      }),
    });
    if (!res.ok) throw new Error('ElevenLabs '+res.status);
    const buf  = await res.arrayBuffer();
    const url  = URL.createObjectURL(new Blob([buf],{type:'audio/mpeg'}));
    currentAudio = new Audio(url);
    currentAudio.playbackRate = voiceRate;
    currentAudio.onended = () => { isSpeaking=false; setState(''); URL.revokeObjectURL(url); };
    currentAudio.onerror = () => { isSpeaking=false; setState(''); };
    await currentAudio.play();
  } catch(e) {
    console.error('ElevenLabs error:', e);
    // fallback to system voice
    isSpeaking = false;
    setState('speaking');
    const u = new SpeechSynthesisUtterance(text);
    u.lang='pt-BR'; u.rate=voiceRate;
    const v = synth.getVoices().find(x=>x.lang.startsWith('pt'));
    if(v) u.voice=v;
    isSpeaking=true;
    u.onend=u.onerror=()=>{isSpeaking=false;setState('');};
    synth.speak(u);
  }
}

function stopSpeaking() {
  synth.cancel();
  if (currentAudio) { try{currentAudio.pause();}catch(e){} currentAudio.src=''; currentAudio=null; }
  isSpeaking = false;
}

/* ══ INTENT DETECTION ══ */
const SITES = {
  youtube:'https://youtube.com', spotify:'https://open.spotify.com',
  gmail:'https://mail.google.com', google:'https://google.com',
  whatsapp:'https://web.whatsapp.com', instagram:'https://instagram.com',
  twitter:'https://twitter.com', x:'https://x.com', netflix:'https://netflix.com',
  maps:'https://maps.google.com', notion:'https://notion.so', github:'https://github.com',
  facebook:'https://facebook.com', tiktok:'https://tiktok.com', twitch:'https://twitch.tv',
  discord:'https://discord.com', figma:'https://figma.com', reddit:'https://reddit.com',
  linkedin:'https://linkedin.com', chatgpt:'https://chat.openai.com', claude:'https://claude.ai',
  drive:'https://drive.google.com', meet:'https://meet.google.com',
};

function detectIntent(text) {
  const t = text.toLowerCase().trim();

  // Open in Chrome specifically
  const chromeM = t.match(/abr[ia]?\s+(?:o\s+|a\s+)?(?:no\s+)?(?:google\s+)?chrome\s+(.+)|(.+)\s+no\s+chrome/);
  if (chromeM) {
    const q = (chromeM[1]||chromeM[2]||'').trim();
    const url = SITES[q] || (q.includes('.')?'https://'+q.replace(/^https?:\/\//,''):'https://google.com/search?q='+encodeURIComponent(q));
    return {type:'chrome', url, label:q};
  }

  // Open known site
  const openM = t.match(/(?:abr[ia]|abre|abrir|vai para|acessa|entra no|entra na|vai no|vai na|ir para)\s+(?:o\s+|a\s+|os\s+)?(.+?)(?:\s+pra mim|\s+por favor|\s+agora)?$/);
  if (openM) {
    const target = openM[1].trim();
    const siteKey = Object.keys(SITES).find(k => target.includes(k));
    if (siteKey) return {type:'url', url:SITES[siteKey], label:siteKey};
    if (target.includes('.') && !target.includes(' ')) return {type:'url', url:'https://'+target.replace(/^https?:\/\//,''), label:target};
    // Otherwise treat as app
    return {type:'app', name:target};
  }

  // Search
  const searchM = t.match(/(?:pesquis[ae]|busca|procura|googl[ae]|search|pesquisar)\s+(?:sobre\s+|por\s+|sobre o\s+)?(.+)/);
  if (searchM) return {type:'search', query:searchM[1].trim()};

  return {type:'ask'};
}

/* ══ EXECUTE INTENT ══ */
async function executeIntent(text) {
  const intent = detectIntent(text);

  if (intent.type === 'url') {
    const msg = `Abrindo ${intent.label}…`;
    addMsg(msg, 'ai');
    speak(msg);
    await ipcRenderer.invoke('open-url', intent.url);

  } else if (intent.type === 'chrome') {
    const msg = `Abrindo no Chrome: ${intent.label}`;
    addMsg(msg, 'ai');
    speak(`Abrindo no Chrome`);
    await ipcRenderer.invoke('open-in-chrome', intent.url);

  } else if (intent.type === 'app') {
    const msg = `Abrindo ${intent.name}…`;
    addMsg(msg, 'ai');
    speak(`Abrindo ${intent.name}`);
    const result = await ipcRenderer.invoke('open-app', intent.name);
    if (!result.ok) {
      const errMsg = `Não encontrei "${intent.name}". Tente um nome diferente.`;
      addMsg(errMsg, 'ai'); speak(errMsg);
    }

  } else if (intent.type === 'search') {
    const url = 'https://www.google.com/search?q='+encodeURIComponent(intent.query);
    const msg = `Pesquisando: ${intent.query}`;
    addMsg(msg, 'ai');
    speak(`Pesquisando por ${intent.query}`);
    await ipcRenderer.invoke('open-url', url);

  } else {
    await askAI(text);
  }
}

/* ══ ASK AI ══ */
async function askAI(text) {
  setState('thinking');
  const thinking = addMsg('…', 'ai');
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model,
        messages:[
          {role:'system', content:'Você é um assistente de voz pessoal no desktop do usuário. Responda em português, de forma clara, direta e amigável. Máximo 3 frases. Sem markdown.'},
          {role:'user', content:text}
        ],
        max_tokens:300, temperature:0.7,
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.choices?.[0]?.message?.content?.trim() || 'Não consegui responder.';
    thinking.textContent = reply;
    speak(reply);
  } catch(e) {
    console.error(e);
    const err = 'Erro: '+(e.message||'falha na API');
    thinking.textContent = err;
    speak('Ocorreu um erro ao conectar.'); setState('');
  }
}

/* ══ TEXT INPUT ══ */
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});
sendBtn.onclick = handleSend;

function handleSend() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  if (isSpeaking) stopSpeaking();
  addMsg(text, 'user');
  executeIntent(text);
}

/* ══ RECORDING ══ */
let mediaRecorder  = null;
let audioChunks    = [];
let micStream      = null;
let silenceInterval= null;

async function startRecording() {
  if (isRecording) return;
  if (isSpeaking)  stopSpeaking();
  try {
    micStream   = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mime  = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(micStream, { mimeType: mime });
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.start(100);
    isRecording = true;
    setState('listening');

    // Silence detection
    const ctx     = new AudioContext();
    const src     = ctx.createMediaStreamSource(micStream);
    const ana     = ctx.createAnalyser();
    ana.fftSize   = 512;
    src.connect(ana);
    const buf     = new Uint8Array(ana.frequencyBinCount);
    let silence   = 0;
    const t0      = Date.now();

    silenceInterval = setInterval(() => {
      if (!isRecording) { clearInterval(silenceInterval); ctx.close(); return; }
      ana.getByteFrequencyData(buf);
      const avg = buf.reduce((a,b)=>a+b,0)/buf.length;
      if (avg < 6) {
        silence += 100;
        if (silence >= 2000 && Date.now()-t0 > 500) {
          clearInterval(silenceInterval);
          ctx.close();
          stopAndProcess();
        }
      } else {
        silence = 0;
      }
    }, 100);

  } catch(e) {
    console.error('Mic error:', e);
    showToast('Erro no microfone: '+e.message);
    setState('');
  }
}

async function stopAndProcess() {
  if (!isRecording) return;
  isRecording = false;
  clearInterval(silenceInterval);

  await new Promise(r => { mediaRecorder.onstop=r; mediaRecorder.stop(); });
  if (micStream) { micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  if (!audioChunks.length) { setState(''); return; }

  setState('thinking');
  const blob = new Blob(audioChunks, {type:'audio/webm'});
  audioChunks = [];

  try {
    const fd = new FormData();
    fd.append('file', blob, 'audio.webm');
    fd.append('model', 'whisper-large-v3-turbo');
    fd.append('language', 'pt');
    fd.append('response_format', 'json');

    const res  = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method:'POST', headers:{'Authorization':'Bearer '+apiKey}, body:fd,
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const transcript = (data.text||'').trim();
    if (!transcript) { showToast('Não entendi, tente novamente.'); setState(''); return; }

    addMsg(transcript, 'user');
    executeIntent(transcript);

  } catch(e) {
    console.error('Whisper error:', e);
    showToast('Erro Whisper: '+e.message);
    setState('');
  }
}

/* ══ MIC BUTTON ══ */
micBtn.onclick = async () => {
  if (isSpeaking)  { stopSpeaking(); return; }
  if (isRecording) { await stopAndProcess(); return; }
  await startRecording();
};
